spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:file:./data/inmob_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

argly:
  api:
    base-url: https://api.argly.com.ar/api
    connect-timeout-ms: 3000
    read-timeout-ms: 5000